services:

  postgres:
    image: postgres:16-alpine
    container_name: systemos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: systemos-chromadb
    restart: unless-stopped
    volumes:
      - chromadb_data:/chroma/chroma
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  searxng:
    image: searxng/searxng:latest
    container_name: systemos-searxng
    restart: unless-stopped
    volumes:
      - ./config/searxng:/etc/searxng
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://lenovo-server:8080
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: systemos-ntfy
    restart: unless-stopped
    command: serve
    volumes:
      - ntfy_data:/var/lib/ntfy
      - ./config/ntfy:/etc/ntfy
    ports:
      - "8002:80"

  gitea:
    image: gitea/gitea:latest
    container_name: systemos-gitea
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__DOMAIN=lenovo-server
      - GITEA__server__ROOT_URL=http://lenovo-server:3001
    volumes:
      - gitea_data:/data
    ports:
      - "3001:3000"
      - "222:22"

  caddy:
    image: caddy:2-alpine
    container_name: systemos-caddy
    restart: unless-stopped
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prismaos-orchestrator
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn services.orchestrator:app --host 0.0.0.0 --port 8000 --reload
    profiles:
      - app

  prisma:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prismaos-prisma
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: python bot/discord_bot.py
    profiles:
      - app

volumes:
  postgres_data:
  chromadb_data:
  ntfy_data:
  gitea_data:
  caddy_data:
  caddy_config:

networks:
  default:
    name: systemos-network
