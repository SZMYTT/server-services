# environment.yaml
# SystemOS infrastructure manifest.
# Covers hardware, inference, models, network, and shared services.
# Project-specific config (workspaces, team, credentials) lives in each project's environment.yaml.

meta:
  system_name: SystemOS
  version: 0.1.0
  owner: szmyt
  last_updated: 2026-04-20
  timezone: Europe/London

# ============================================================
# HARDWARE
# ============================================================

hardware:

  inference_server:
    name: macbook-pro
    role: primary_llm_inference
    os: macOS
    chip: Apple M1 Max
    ram_gb: 64
    storage_gb: 1000
    status: active
    always_on: true
    ollama: true
    tailscale_hostname: macbook-pro
    ollama_port: 11434
    notes: >
      64GB unified memory supports 70B models comfortably.
      Runs Ollama only - no other services.

  server:
    name: lenovo-yoga
    role: primary_server
    os: Ubuntu 24.04
    chip: Intel Core i7
    ram_gb: 16
    storage_gb: 512
    architecture: x86_64
    status: active
    always_on: true
    tailscale_ip: 100.119.217.120
    tailscale_hostname: lenovo-server
    local_ip: 192.168.4.20
    project_path: /home/szmyt/server-services
    hosts:
      - orchestrator
      - vector_memory
      - mcp_servers
      - prisma_bot
      - web_ui
      - postgres
      - chromadb
      - searxng
      - ntfy
      - gitea
      - caddy

  primary_workstation:
    name: gaming-pc
    role: development_access_only
    os: Windows 11
    chip: AMD Ryzen 3700X
    ram_gb: 16
    gpu: NVIDIA RTX 3060 Ti
    storage_ssd_gb: 1000
    storage_hdd_gb: 8000
    status: active
    ollama: false
    uses:
      - vs_code_development
      - remote_ssh_to_lenovo
      - web_ui_access

  spare_laptop:
    name: asus-proart-pz13
    role: spare
    os: Windows 11
    chip: Snapdragon X Plus
    architecture: ARM
    ram_gb: 16
    storage_gb: 1000
    status: spare

  mobile:
    name: pixel-9
    role: mobile_client
    os: Android
    status: active
    uses:
      - discord_commands
      - ntfy_notifications
      - tailscale_access
      - photo_pipeline_source

# ============================================================
# NETWORK
# ============================================================

network:
  vpn: tailscale
  lenovo_tailscale_ip: 100.119.217.120
  lenovo_local_ip: 192.168.4.20
  status: lenovo_enrolled
  devices_to_enroll:
    - macbook-pro
    - gaming-pc
    - pixel-9

# ============================================================
# INFERENCE
# ============================================================

inference:
  primary:
    host: macbook-pro
    engine: ollama
    url: http://macbook-pro:11434
    max_model_size: 70B

# ============================================================
# MODELS
# ============================================================

models:

  orchestrator:
    name: llama3.3:70b
    host: macbook-pro
    use: task decomposition, routing, complex reasoning

  researcher:
    name: llama3.3:70b
    host: macbook-pro
    use: web research, synthesis, long context

  coder:
    name: qwen2.5-coder:32b
    host: macbook-pro
    use: code generation, review, refactoring

  content:
    name: mistral:22b
    host: macbook-pro
    use: social copy, ad copy, brand voice

  finance:
    name: phi4:14b
    host: macbook-pro
    use: structured output, document analysis

  fast:
    name: llama3.2:3b
    host: macbook-pro
    use: instant replies, classification, routing, comms

  legal:
    name: gemma3:27b
    host: macbook-pro
    use: legal compliance, complex reasoning, regulated content

  precise:
    name: qwen2.5:14b
    host: macbook-pro
    use: structured data extraction, finance, document analysis

  vision:
    name: llava:13b
    host: macbook-pro
    use: image analysis, receipts, property photos, screenshots
    status: pull_when_needed

  embed:
    name: nomic-embed-text
    host: macbook-pro
    use: semantic embeddings for future RAG memory
    status: pull_when_needed

# ============================================================
# SHARED SERVICES
# ============================================================

services:

  postgres:
    status: running
    port: 5433
    container: systemos-postgres
    db: systemos

  chromadb:
    status: running
    port: 8001
    container: systemos-chromadb

  searxng:
    status: running
    port: 8080
    container: systemos-searxng

  ntfy:
    status: running
    port: 8002
    container: systemos-ntfy

  gitea:
    status: running
    port: 3001
    container: systemos-gitea
    url: http://192.168.4.20:3001

  caddy:
    status: running
    ports: [80, 443]
    container: systemos-caddy

# ============================================================
# TASK ROUTING
# ============================================================

task_routing:
  fast_lane:
    host: macbook-pro
    model: llama3.2:3b
    triggers:
      - reply_draft
      - stock_alert
      - daily_summary
      - classification
      - short_notification
  heavy_lane:
    host: macbook-pro
    model: llama3.3:70b
    triggers:
      - research
      - content_creation
      - document_analysis
      - financial_forecast
      - campaign_strategy
  fallback:
    strategy: queue_and_wait
    note: All inference is on MacBook Pro only. If unreachable, tasks queue until it returns.

# ============================================================
# OUTPUT PREFERENCES
# ============================================================

output:
  default_format: markdown
  user_facing:
    summary_lines: 5
    include_report_link: true
  operator_facing:
    include_tools_called: true
    include_confidence: true
    include_sources: true
    include_token_count: true
  analytics:
    enabled: true
    digest_frequency: weekly
