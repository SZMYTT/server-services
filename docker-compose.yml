services:

  postgres:
    image: postgres:16-alpine
    container_name: systemos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: systemos-chromadb
    restart: unless-stopped
    volumes:
      - chromadb_data:/chroma/chroma
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || curl -sf http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: systemos-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  ragflow:
    image: infiniflow/ragflow:v0.18.0
    container_name: systemos-ragflow
    restart: unless-stopped
    environment:
      - RAGFLOW_OLLAMA_BASE_URL=${OLLAMA_URL:-http://100.76.139.41:11434}
    volumes:
      - ragflow_data:/ragflow/data
      - ragflow_logs:/ragflow/logs
    ports:
      - "8088:80"   # Web UI + API
    depends_on:
      - qdrant
    shm_size: '128mb'

  neo4j:
    image: neo4j:community
    container_name: systemos-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/password}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol

  searxng:
    image: searxng/searxng:latest
    container_name: systemos-searxng
    restart: unless-stopped
    volumes:
      - ./config/searxng:/etc/searxng
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://lenovo-server:8080
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: systemos-ntfy
    restart: unless-stopped
    command: serve
    volumes:
      - ntfy_data:/var/lib/ntfy
      - ./config/ntfy:/etc/ntfy
    ports:
      - "8002:80"

  gitea:
    image: gitea/gitea:latest
    container_name: systemos-gitea
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__DOMAIN=lenovo-server
      - GITEA__server__ROOT_URL=http://lenovo-server:3001
    volumes:
      - gitea_data:/data
    ports:
      - "3001:3000"
      - "222:22"

  caddy:
    image: caddy:2-alpine
    container_name: systemos-caddy
    restart: unless-stopped
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  chromadb_data:
  qdrant_data:
  ragflow_data:
  ragflow_logs:
  neo4j_data:
  neo4j_logs:
  ntfy_data:
  gitea_data:
  caddy_data:
  caddy_config:

networks:
  default:
    name: systemos-network
