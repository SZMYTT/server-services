{% extends "base.html" %}
{% block title %}Training Calendar | HealthOS{% endblock %}

{% block head %}
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
<style>
.fc {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
}
.fc .fc-toolbar-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--c-text-primary);
}
.fc .fc-button-primary {
  background: var(--c-gold-dark);
  border-color: var(--c-gold-dark);
  font-size: 12px;
  padding: 4px 12px;
}
.fc .fc-button-primary:not(:disabled):hover { opacity: 0.85; }
.fc .fc-button-primary:not(:disabled).fc-button-active { background: var(--c-success); border-color: var(--c-success); }
.fc .fc-daygrid-day-number { color: var(--c-text-muted); font-size: 12px; }
.fc .fc-col-header-cell { background: var(--c-input-bg); }
.fc .fc-col-header-cell-cushion { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--c-text-muted); }
.fc-event { border-radius: 4px !important; font-size: 11.5px !important; }
.fc-event.completed { background: var(--c-success) !important; border-color: var(--c-success) !important; color: #fff !important; }
.fc-event.planned   { background: rgba(191,168,128,0.2) !important; border: 1px dashed var(--c-gold) !important; color: var(--c-gold-dark) !important; }
.calendar-wrap {
  background: var(--c-card);
  border: 1px solid var(--c-card-border);
  border-radius: 10px;
  padding: 20px 24px;
  box-shadow: var(--shadow-card);
}

.legend-row {
  display: flex; gap: 20px; margin-bottom: 16px;
  font-size: 12px; color: var(--c-text-muted);
  align-items: center;
}
.legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; display:inline-block; }
</style>
{% endblock %}

{% block content %}

<div class="page-header">
  <h1 class="page-title">Training Calendar</h1>
  <p class="page-subtitle">Monthly overview of planned vs. completed workouts</p>
</div>

<div class="legend-row">
  <span><span class="legend-dot" style="background:var(--c-success);"></span>Completed workout</span>
  <span><span class="legend-dot" style="background:var(--c-gold);opacity:0.6;"></span>Planned session</span>
</div>

<div class="calendar-wrap">
  <div id="calendar"></div>
</div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const cal = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    height: 'auto',
    headerToolbar: { left:'prev,next today', center:'title', right:'dayGridMonth,timeGridWeek' },
    events: '/api/calendar/events',
    eventClick: function(info) {
      showToast('Workout: ' + info.event.title);
    },
    eventClassNames: function(arg) {
      return [arg.event.extendedProps.className || 'completed'];
    },
  });
  cal.render();
});
</script>
{% endblock %}
